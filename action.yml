name: "CLA Assistant Lite"
description: "Handle Contributor License Agreement (CLA) or Developer Certificate of Origin (DCO) signatures via PR comments. Maintained fork."
author: "ibakshay; maintained by badideasforsale"
branding:
  icon: "award"
  color: blue
inputs:
  path-to-signatures:
    description: "Path to the JSON file where CLA/DCO signatures are stored."
    default: "./signatures/cla.json"
  branch:
    description: "Branch on the storage repo where signatures are committed. Must not be branch-protected."
    default: "master"
  allowlist:
    description: "Comma-separated users + wildcard patterns that don't have to sign the CLA/DCO document. Case-insensitive."
    default: ""
  exempt-repo-org-members:
    description: "if 'true', members of the organization that owns this repository are auto-allowlisted (no signature required). Public-org members are visible to the default GITHUB_TOKEN; private members require a PAT or App token with read:org scope."
    default: "false"
  remote-repository-name:
    description: "provide the remote repository name where all the signatures should be stored"
  remote-organization-name:
    description: "provide the remote organization name where all the signatures should be stored"
  path-to-document:
    description: "Full URL to the CLA or DCO document the contributor must sign. Can be any web-accessible file (repo, gist, hosted)."
  signed-commit-message:
    description: "Commit message stamped on signature pushes. Supports $contributorName, $pullRequestNo, $owner, $repo substitutions."
  create-file-commit-message:
    description: "Commit message when the action auto-creates the signatures file on first run."
  custom-notsigned-prcomment:
    description: "Override the bot's 'please sign' PR comment. Supports $you and $pathToDocument substitutions."
  custom-pr-sign-comment:
    description: "Override the exact phrase contributors must post to sign. Default: 'I have read the CLA/DCO Document and I hereby sign the CLA/DCO' (auto-flips on use-dco-flag)."
  custom-allsigned-prcomment:
    description: "Override the bot's 'all signed' PR comment. Default: 'All contributors have signed the CLA/DCO ✍️ ✅' (auto-flips on use-dco-flag)."
  use-dco-flag:
    description: "Set this to true if you want to use a dco instead of a cla"
    default: "false"
  lock-pullrequest-aftermerge:
    description: "Will lock the pull request after merge so that the signature the contributors cannot revoke their signature comments after merge"
    default: "true"
  suggest-recheck:
    description: "Controls whether or not the action's comment should suggest that users comment `recheck`."
    default: "true"
  pull-request-number:
    description: "Override the PR number the action operates on. Default is `context.issue.number` (the PR that triggered the workflow). Required when the workflow is triggered by `workflow_run` or any non-PR event, since those payloads don't carry a PR number directly."
    default: ""
  github-app-id:
    description: "GitHub App ID. When set together with the GITHUB_APP_PRIVATE_KEY env var, the action authenticates as that App in place of GITHUB_TOKEN / PERSONAL_ACCESS_TOKEN. Strongly recommended over PAT; see README for setup."
    default: ""
  github-app-installation-id:
    description: "Optional. Skip the auto-discovery API call (saves ~200ms per run) by providing the installation id explicitly. Look it up via `https://github.com/settings/installations` or the API. Has no effect unless github-app-id is also set."
    default: ""
  bot-name:
    description: "Optional. Name to use as the author/committer of signature commits to the storage file. Defaults to the token's identity (the App's bot user for App auth, the PAT owner, or `github-actions[bot]`). Must be set together with `bot-email`."
    default: ""
  bot-email:
    description: "Optional. Email to use as the author/committer of signature commits. Pairs with `bot-name`. A common stable choice for App auth is `<app-id>+<slug>[bot]@users.noreply.github.com`."
    default: ""
runs:
  using: "node24"
  main: 'dist/index.js'
