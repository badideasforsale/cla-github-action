name: OpenSSF Scorecard

# Weekly supply-chain health check. Output is published to
# https://securityscorecards.dev/viewer/?uri=github.com/<owner>/<repo>
# and surfaces actionable improvements (branch protection, signed releases,
# pinned actions, etc.). Pure observability — never fails the build.

on:
  branch_protection_rule:
  schedule:
    - cron: '34 7 * * 1' # Mondays at 07:34 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed for the Code-scanning upload at the end.
      security-events: write
      # Needed to receive an OIDC token for publishing to scorecards.dev.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to https://securityscorecards.dev — gives a public badge.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          sarif_file: results.sarif
